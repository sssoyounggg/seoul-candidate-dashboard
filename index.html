<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>서울시장 후보 이슈 대시보드</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
 <header class="site-header">
  <div class="header-inner main-header-layout">
    <div class="header-copy">
      <p class="eyebrow">Seoul Election Dashboard</p>
      <h1>서울시장 후보 이슈 대시보드</h1>
      <p class="header-description">
        후보별 주요 키워드, 언급량, 쟁점 흐름을 한 화면에서 비교하는 정적 웹 대시보드입니다.
      </p>
    </div>

    <div id="electionCountdown" class="election-countdown"></div>
  </div>
</header>

  <main class="page">
    <section class="toolbar" aria-label="후보 검색 및 정렬">
      <div>
        <h2>후보 목록</h2>
        <p>후보 카드를 클릭하면 상세 페이지로 이동합니다.</p>
      </div>

      <div class="toolbar-controls">
        <input
          id="searchInput"
          class="search-input"
          type="search"
          placeholder="후보명, 정당, 키워드 검색"
        />

        <select id="partyFilter" class="select-input">
          <option value="all">전체 정당</option>
        </select>
      </div>
    </section>

    <section id="candidateGrid" class="candidate-grid" aria-label="후보 카드 목록">
    </section>
  </main>

  <footer class="site-footer">
    <p>데이터는 예시용입니다.</p>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
