<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>후보 상세 페이지</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header detail-header">
    <div class="header-inner">
      <a class="back-link" href="index.html">← 메인으로 돌아가기</a>
      <p class="eyebrow">Candidate Detail</p>
      <h1 id="candidateName">후보 상세</h1>
      <p id="candidateSubtitle" class="header-description"></p>
    </div>
  </header>

  <main class="page detail-page">
    <section class="profile-section">
      <div id="profileCard" class="profile-card"></div>

      <div class="summary-panel">
        <h2>핵심 요약</h2>
        <div id="summaryContent"></div>
      </div>
    </section>

    <section class="content-section">
      <div class="section-title-row">
        <div>
          <h2>기간별 주요 키워드</h2>
          <p>최근 3일, 7일, 30일 기준으로 키워드 흐름을 비교합니다.</p>
        </div>

        <div class="period-buttons" aria-label="기간 선택">
          <button class="period-button" data-period="3d">3일</button>
          <button class="period-button active" data-period="7d">7일</button>
          <button class="period-button" data-period="30d">30일</button>
        </div>
      </div>

      <div id="keywordList" class="keyword-list"></div>
    </section>

    <section class="content-section">
      <h2>키워드 언급량 차트</h2>
      <p class="section-description">
        막대 길이는 같은 기간 안에서의 상대적 크기를 보여줍니다.
      </p>
      <div id="keywordChart" class="chart-box"></div>
    </section>

   <section class="content-section timeline-section">
  <div class="section-title-row">
    <div>
      <h2>이슈 타임라인</h2>
      <p>타임라인 항목 선택시 아래 시계열 그래프가 해당 이슈 기준으로 바뀝니다.</p>
    </div>
  </div>

  <div id="timelineList" class="timeline-list"></div>

  <div id="timelineChart" class="timeline-chart-area"></div>
</section>
  </main>

  <footer class="site-footer">
    <p>표시된 데이터는 대시보드 구현 연습용 예시입니다.</p>
  </footer>

  <script src="data.js"></script>
  <script src="candidate.js"></script>
</body>
</html>
